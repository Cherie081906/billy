<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Billy 💕</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ffd6e0, #ff9bb3);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    text-align: center;
}

.container {
    position: relative;
}

h1 {
    color: #ff2e6a;
    font-size: 2.5rem;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background: #4CAF50;
    color: white;
}

#no {
    background: #e74c3c;
    color: white;
    position: absolute;
}
</style>

</head>

<body>

<div class="container">
    <h1>Billy… will you date me? 💕</h1>

```
<img src="https://media.tenor.com/7xKXgJYFQnEAAAAi/cute.gif" width="150">

<br><br>

<button id="yes">Yes 😳</button>
<button id="no">No 😢</button>
```

</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * window.innerWidth * 0.8;
    const y = Math.random() * window.innerHeight * 0.8;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = () => {
    document.body.innerHTML = `
        <h1 style="color:#ff2e6a;">Are you sure Billy? 😏</h1>
        <button onclick="finalYes()" style="padding:15px 30px; background:#4CAF50; color:white; border:none; border-radius:10px;">Yes 💕</button>
    `;
};

function finalYes() {
    document.body.innerHTML = `
        <h1 style="color:#ff2e6a;">YAYYYY 💕🥰</h1>
        <p>You’re mine now Billy 😌</p>
        <img src="https://media.tenor.com/0AVbKGY_MxMAAAAi/love-cute.gif" width="200">
    `;
}
</script>

</body>
</html>

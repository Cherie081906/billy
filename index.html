body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ffe3ec, #ffc6da, #ffdbe8);
  overflow: hidden;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 520px;
  padding: 28px 22px 34px;
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.28);
  backdrop-filter: blur(10px);
  box-shadow: 0 12px 35px rgba(255, 105, 180, 0.18);
  position: relative;
  z-index: 2;
}

h1 {
  color: #ff2f7d;
  font-size: 2.2rem;
  line-height: 1.3;
  margin-bottom: 20px;
  text-shadow: 1px 1px 10px rgba(255, 105, 180, 0.15);
}

.gif-box img {
  width: 240px;
  max-width: 85%;
  border-radius: 22px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  margin-bottom: 24px;
}

.buttons {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  margin-top: 8px;
  min-height: 110px;
}

button {
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 18px;
  transition: all 0.25s ease;
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
  font-family: inherit;
}

#yesBtn {
  background: linear-gradient(135deg, #49d36d, #31b85a);
  font-size: 25px;
  padding: 18px 40px;
}

#noBtn {
  background: linear-gradient(135deg, #ff5d5d, #e53d3d);
  font-size: 21px;
  padding: 16px 28px;
}

.hearts {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 1;
}

.heart {
  position: absolute;
  bottom: -30px;
  opacity: 0.75;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

.final-message h1 {
  font-size: 2.8rem;
  margin-bottom: 10px;
}

.final-message p {
  color: #d63384;
  font-size: 1.25rem;
  font-weight: bold;
  margin-bottom: 20px;
}

.final-message img {
  width: 260px;
  max-width: 88%;
  border-radius: 22px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

@media (max-width: 600px) {
  h1 {
    font-size: 1.8rem;
  }

  #yesBtn {
    font-size: 22px;
    padding: 16px 34px;
  }

  #noBtn {
    font-size: 18px;
    padding: 14px 22px;
  }

  .gif-box img {
    width: 210px;
  }

  .buttons {
    gap: 14px;
  }
}

      "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTF6NWg5d3RkYXo5d3BkN3NjcDc5YzM5cDg0cGJwanBjNHN0ZHRuOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/y6lu312reRzVC46yFn/giphy.gif",
      "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWNqb2lzancydHRncDVxejI3YnN6MGxvaDNraXN2MTBodXpxNmF2eiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/QbwfjPd2OamuL60iNz/giphy.gif",
      "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExbHFyeTdxMnZqdWlwNDZ6eXBtcGxkYWRoOGthOXp5OXZnOGdyNjhldSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xTiTnMhJTwNHChdTZS/giphy.gif",
      "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExY2Z5amszdGFyMWR3MzJiaHc2MDcwNTZ5djNicWJueWtneTc2OHpybCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/5vYwHanb6y3HWBQIox/giphy.gif",

    ];

    const finalGif = "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWNqb2lzancydHRncDVxejI3YnN6MGxvaDNraXN2MTBodXpxNmF2eiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/QbwfjPd2OamuL60iNz/giphy.gif";

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const question = document.getElementById("question");
    const mainGif = document.getElementById("mainGif");
    const app = document.getElementById("app");
    const hearts = document.getElementById("hearts");
    const buttonArea = document.getElementById("buttonArea");

    let noCount = 0;
    let yesScale = 1;
    let noScale = 1;

    function createHeart(target) {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = Math.random() > 0.5 ? "💖" : "💕";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";
      heart.style.fontSize = (16 + Math.random() * 20) + "px";
      target.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(() => createHeart(hearts), 500);

    noBtn.addEventListener("click", () => {
      noCount++;

      const index = Math.min(noCount, questions.length - 1);
      question.textContent = questions[index];
      mainGif.src = gifs[index];

      yesScale += 0.18;
      noScale -= 0.09;

      if (noScale < 0.18) {
        noScale = 0.18;
      }

      yesBtn.style.transform = `scale(${yesScale})`;
      noBtn.style.transform = `scale(${noScale})`;

      if (noCount >= 10) {
        question.textContent = "За тэгвэл одоо тиймээ дар 😭💖";
        mainGif.src = gifs[10];
        noBtn.style.display = "none";
        yesBtn.textContent = "ТИЙМЭЭ 💘";
        yesBtn.style.transform = "scale(1.9)";
        yesBtn.style.padding = "24px 58px";
        yesBtn.style.fontSize = "30px";
        buttonArea.style.gap = "0";
      }
    });

    yesBtn.addEventListener("click", () => {
      document.body.innerHTML = `
        <div class="hearts" id="finalHearts"></div>
        <div class="container final-message">
          <h1>YAYYYYY 💕🥹</h1>
          <p>Billy, чи зөв сонголт хийлээ 😌💖</p>
          <img src="${finalGif}" alt="happy gif" />
        </div>
      `;

      const finalHearts = document.getElementById("finalHearts");
      setInterval(() => createHeart(finalHearts), 320);
    });
  </script>
